<svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 250" width="300" height="250" class="drewmark-logo">
	<style>
		.drewmark-logo .black-strokes * {
			fill: #000000;
			@media (prefers-color-scheme: dark) {fill: #ffffff;}
		}
		.drewmark-logo .blue-strokes * {
			fill: #534ab7;
			@media (prefers-color-scheme: dark) {fill: #ACB548;}
		}
		.dark {
			.black-strokes * {fill: #ffffff;}
			.blue-strokes * {fill: #ACB548;}
		}
	</style>
	<g class="black-strokes">
		<rect x="17" y="20" width="10" height="210"/>
		<rect x="273" y="20" width="10" height="210"/>
		<rect x="205" y="3" width="10" height="138" transform="rotate(45, 210, 73)" />
	</g>
	<g class="blue-strokes">
		<rect x="88" y="2" width="10" height="148" transform="rotate(-45, 93, 76)" />
	        <rect x="84" y="108" width="10" height="138" transform="rotate(45, 88, 177)" />
	</g>
	<script>
		var params = new URLSearchParams(window.location.search);
		if (params.get('theme') === 'dark') {document.documentElement.classList.add('dark');}
	</script>
</svg>
